<!-- Serve with: npx serve design/ — fetch() requires HTTP, not file:// -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>midi-creator — Project Dashboard</title>
<style>
  :root {
    --status-open: #94a3b8;
    --status-in-progress: #3b82f6;
    --status-blocked: #f97316;
    --status-done: #22c55e;
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263045;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --radius: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header .subtitle { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  header .actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--border); }
  #auto-refresh-label { color: var(--text-muted); font-size: 12px; }

  /* ── Error Banner ────────────────────────────────────────── */
  .error-banner {
    background: #7f1d1d;
    border: 1px solid #b91c1c;
    color: #fecaca;
    padding: 12px 20px;
    display: none;
  }
  .error-banner.visible { display: block; }

  /* ── Layout ──────────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto auto auto;
    gap: 16px;
    padding: 16px;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
    background: rgba(0,0,0,0.15);
  }
  .panel-body { padding: 14px 16px; }

  /* ── Milestones panel ────────────────────────────────────── */
  #panel-milestones { grid-column: 1; grid-row: 1; }

  .milestone-item + .milestone-item { margin-top: 16px; }
  .milestone-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .milestone-name { font-weight: 600; font-size: 14px; }
  .milestone-count { color: var(--text-muted); font-size: 12px; }
  .progress-bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* ── Status badge ────────────────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .badge-Open         { background: rgba(148,163,184,0.18); color: var(--status-open); }
  .badge-In-Progress  { background: rgba(59,130,246,0.18);  color: var(--status-in-progress); }
  .badge-Blocked      { background: rgba(249,115,22,0.18);  color: var(--status-blocked); }
  .badge-Done         { background: rgba(34,197,94,0.18);   color: var(--status-done); }

  /* ── Epics kanban ────────────────────────────────────────── */
  #panel-epics { grid-column: 2; grid-row: 1; }
  .kanban {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .kanban-col-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }
  .kanban-col-header.col-Open        { border-color: var(--status-open);        color: var(--status-open); }
  .kanban-col-header.col-In-Progress { border-color: var(--status-in-progress); color: var(--status-in-progress); }
  .kanban-col-header.col-Blocked     { border-color: var(--status-blocked);     color: var(--status-blocked); }
  .kanban-col-header.col-Done        { border-color: var(--status-done);        color: var(--status-done); }
  .epic-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 8px;
    border-left: 3px solid transparent;
  }
  .epic-card.status-Open        { border-left-color: var(--status-open); }
  .epic-card.status-In-Progress { border-left-color: var(--status-in-progress); }
  .epic-card.status-Blocked     { border-left-color: var(--status-blocked); }
  .epic-card.status-Done        { border-left-color: var(--status-done); }
  .epic-card-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .epic-card-meta  { color: var(--text-muted); font-size: 11px; }

  /* ── Stories list ────────────────────────────────────────── */
  #panel-stories { grid-column: 1 / -1; grid-row: 2; }
  .stories-filters {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stories-filters select,
  .stories-filters input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .stories-filters input { flex: 1; min-width: 160px; }
  .stories-table { width: 100%; border-collapse: collapse; }
  .stories-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .stories-table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(51,65,85,0.5);
    vertical-align: middle;
  }
  .stories-table tr:last-child td { border-bottom: none; }
  .stories-table tr:hover td { background: rgba(255,255,255,0.03); }
  .story-type-icon { font-size: 13px; margin-right: 4px; }
  .story-id { color: var(--text-muted); font-size: 12px; font-family: monospace; }

  /* ── Dependency graph ────────────────────────────────────── */
  #panel-graph { grid-column: 1 / -1; grid-row: 3; }
  .graph-container {
    overflow: hidden;
    position: relative;
    height: 480px;
    cursor: grab;
    background: radial-gradient(ellipse at 50% 50%, #1a2744 0%, var(--bg) 100%);
  }
  .graph-container:active { cursor: grabbing; }
  #graph-svg {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    user-select: none;
  }
  .graph-tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 10;
    max-width: 220px;
  }
  .graph-legend {
    display: flex;
    gap: 16px;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ── Empty / placeholder ─────────────────────────────────── */
  .empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px; }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    #panel-milestones, #panel-epics, #panel-stories, #panel-graph {
      grid-column: 1; grid-row: auto;
    }
    .kanban { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .kanban { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1 id="proj-title">midi-creator — Project Dashboard</h1>
    <div class="subtitle" id="proj-subtitle">Loading…</div>
  </div>
  <div class="actions">
    <span id="auto-refresh-label">Auto-refresh in <span id="countdown">30</span>s</span>
    <button class="btn" id="refresh-btn">↺ Refresh</button>
  </div>
</header>

<div id="error-banner" class="error-banner"></div>

<div class="grid">
  <!-- Panel 1: Milestones -->
  <section class="panel" id="panel-milestones">
    <div class="panel-header">Milestones</div>
    <div class="panel-body" id="milestones-body"><div class="empty">Loading…</div></div>
  </section>

  <!-- Panel 2: Epics Kanban -->
  <section class="panel" id="panel-epics">
    <div class="panel-header">Epics</div>
    <div class="panel-body" id="epics-body"><div class="empty">Loading…</div></div>
  </section>

  <!-- Panel 3: Stories List -->
  <section class="panel" id="panel-stories">
    <div class="panel-header">Stories</div>
    <div class="stories-filters">
      <select id="filter-status"><option value="">All Statuses</option></select>
      <select id="filter-type"><option value="">All Types</option></select>
      <select id="filter-epic"><option value="">All Epics</option></select>
      <input id="filter-search" type="text" placeholder="Search stories…" />
    </div>
    <div style="overflow-x:auto">
      <table class="stories-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Epic</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="stories-tbody"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </section>

  <!-- Panel 4: Dependency Graph -->
  <section class="panel" id="panel-graph">
    <div class="panel-header">Dependency Graph — Epics</div>
    <div class="graph-container" id="graph-container">
      <svg id="graph-svg"></svg>
      <div class="graph-tooltip" id="graph-tooltip"></div>
    </div>
    <div class="graph-legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--status-open)"></span>Open</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--status-in-progress)"></span>In-Progress</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--status-blocked)"></span>Blocked</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--status-done)"></span>Done</span>
      <span style="color:var(--text-muted);margin-left:auto;font-size:11px">Scroll to zoom · Drag to pan</span>
    </div>
  </section>
</div>

<script type="module">
// ─── Utilities ────────────────────────────────────────────────────────────────
function statusColor(s) {
  return { Open: '#94a3b8', 'In-Progress': '#3b82f6', Blocked: '#f97316', Done: '#22c55e' }[s] ?? '#94a3b8';
}
function badge(s) {
  return `<span class="badge badge-${s.replace(' ', '-')}">${s}</span>`;
}
function typeIcon(t) {
  return { Feature: '★', Bug: '⚠', Enhancement: '✦' }[t] ?? '•';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Balanced-array extractor ─────────────────────────────────────────────────
function extractArray(src, name) {
  const marker = `export const ${name}`;
  const start = src.indexOf(marker);
  if (start === -1) return null;
  const bracketStart = src.indexOf('[', start);
  if (bracketStart === -1) return null;
  let depth = 0, i = bracketStart;
  while (i < src.length) {
    if (src[i] === '[') depth++;
    else if (src[i] === ']') { depth--; if (depth === 0) return src.slice(bracketStart, i + 1); }
    i++;
  }
  return null;
}

// Strip TS-only syntax that breaks Function() eval
function stripTs(src) {
  return src
    .replace(/\/\/.*/g, '')            // single-line comments
    .replace(/\/\*[\s\S]*?\*\//g, '')  // block comments
    .replace(/\s+satisfies\s+\w[\w<>\[\]|&,.]*\s*;/g, ';')  // satisfies clause
    .replace(/:\s*\w[\w<>\[\]|&,. ]*(?=\s*[,\]\}])/g, '');  // inline type annotations on props
}

// ─── Load tracker.ts ──────────────────────────────────────────────────────────
async function loadTracker() {
  let raw;
  try {
    const resp = await fetch('../tracker.ts');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    raw = await resp.text();
  } catch (e) {
    showError(`Could not load tracker.ts — make sure you are serving via HTTP (npx serve design/)<br><code>${escHtml(e.message)}</code>`);
    return null;
  }

  function parseArr(name) {
    const block = extractArray(raw, name);
    if (!block) return [];
    try {
      // Evaluate the raw array literal — it contains only string/number/bool primitives
      return new Function('return (' + block + ')')();
    } catch (e) {
      showError(`tracker.ts — could not parse "${name}" array: ${escHtml(e.message)}`);
      return [];
    }
  }

  return {
    milestones: parseArr('milestones'),
    epics:      parseArr('epics'),
    stories:    parseArr('stories'),
  };
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.innerHTML = msg;
  el.classList.add('visible');
}

// ─── Panel 1: Milestones ──────────────────────────────────────────────────────
function renderMilestones(milestones, epics, stories) {
  const el = document.getElementById('milestones-body');
  if (!milestones.length) { el.innerHTML = '<div class="empty">No milestones yet</div>'; return; }

  const epicMap  = Object.fromEntries(epics.map(e => [e.id, e]));
  const storyMap = Object.fromEntries(stories.map(s => [s.id, s]));

  el.innerHTML = milestones.map(m => {
    const mEpics    = (m.epicIds || []).map(id => epicMap[id]).filter(Boolean);
    const allSIds   = mEpics.flatMap(e => e.storyIds || []);
    const total     = allSIds.length;
    const done      = allSIds.filter(id => storyMap[id]?.status === 'Done').length;
    const pct       = total ? Math.round((done / total) * 100) : 0;
    const color     = statusColor(m.status);

    return `
      <div class="milestone-item">
        <div class="milestone-title-row">
          <span class="milestone-name">${escHtml(m.title)}</span>
          ${badge(m.status)}
        </div>
        <div class="milestone-count" style="margin-bottom:6px">${done} / ${total} stories done</div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
  }).join('');
}

// ─── Panel 2: Epics Kanban ────────────────────────────────────────────────────
function renderEpics(epics, milestones) {
  const el = document.getElementById('epics-body');
  if (!epics.length) { el.innerHTML = '<div class="empty">No epics yet</div>'; return; }

  const msMap = Object.fromEntries(milestones.map(m => [m.id, m]));
  const cols  = ['Open', 'In-Progress', 'Blocked', 'Done'];

  el.innerHTML = `<div class="kanban">${cols.map(status => {
    const colClass = status.replace(' ', '-');
    const cards = epics.filter(e => e.status === status).map(e => {
      const ms    = msMap[e.milestoneId];
      const count = (e.storyIds || []).length;
      return `
        <div class="epic-card status-${colClass}">
          <div class="epic-card-title">${escHtml(e.title)}</div>
          <div class="epic-card-meta">${ms ? escHtml(ms.title) : ''} · ${count} stor${count !== 1 ? 'ies' : 'y'}</div>
        </div>`;
    }).join('') || '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:8px 0">—</div>';

    return `
      <div>
        <div class="kanban-col-header col-${colClass}">${status}</div>
        ${cards}
      </div>`;
  }).join('')}</div>`;
}

// ─── Panel 3: Stories ─────────────────────────────────────────────────────────
let _allStories = [], _allEpics = [];

function renderStories(stories, epics) {
  _allStories = stories;
  _allEpics   = epics;

  const statusSel = document.getElementById('filter-status');
  const typeSel   = document.getElementById('filter-type');
  const epicSel   = document.getElementById('filter-epic');

  // Rebuild dropdowns
  [statusSel, typeSel, epicSel].forEach(s => { while (s.options.length > 1) s.remove(1); });

  [...new Set(stories.map(s => s.status))].forEach(v => statusSel.add(new Option(v, v)));
  [...new Set(stories.map(s => s.type))  ].forEach(v => typeSel.add(new Option(v, v)));
  epics.forEach(e => epicSel.add(new Option(e.title, e.id)));

  applyStoryFilters();
}

function applyStoryFilters() {
  const statusVal = document.getElementById('filter-status').value;
  const typeVal   = document.getElementById('filter-type').value;
  const epicVal   = document.getElementById('filter-epic').value;
  const search    = document.getElementById('filter-search').value.toLowerCase();
  const epicMap   = Object.fromEntries(_allEpics.map(e => [e.id, e]));

  const filtered = _allStories.filter(s => {
    if (statusVal && s.status !== statusVal) return false;
    if (typeVal   && s.type   !== typeVal)   return false;
    if (epicVal   && s.epicId !== epicVal)   return false;
    if (search    && !s.title.toLowerCase().includes(search) && !s.id.toLowerCase().includes(search)) return false;
    return true;
  });

  const tbody = document.getElementById('stories-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No stories match the current filters</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(s => {
    const epic = epicMap[s.epicId];
    return `
      <tr>
        <td class="story-id">${s.id}</td>
        <td><span class="story-type-icon" title="${s.type}">${typeIcon(s.type)}</span>${escHtml(s.title)}</td>
        <td style="color:var(--text-muted)">${s.type}</td>
        <td style="color:var(--text-muted);font-size:12px">${epic ? escHtml(epic.title) : s.epicId}</td>
        <td>${badge(s.status)}</td>
      </tr>`;
  }).join('');
}

['filter-status','filter-type','filter-epic'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyStoryFilters));
document.getElementById('filter-search').addEventListener('input', applyStoryFilters);

// ─── Panel 4: Dependency Graph (SVG DAG, epics) ───────────────────────────────
function topoLayers(nodes) {
  const ids   = nodes.map(n => n.id);
  const inDeg = Object.fromEntries(ids.map(id => [id, 0]));
  const fwd   = Object.fromEntries(ids.map(id => [id, []]));

  nodes.forEach(n => n.deps.forEach(dep => {
    if (dep in inDeg) inDeg[n.id]++;
    if (dep in fwd)   fwd[dep].push(n.id);
  }));

  const layer   = Object.fromEntries(ids.map(id => [id, 0]));
  const queue   = ids.filter(id => inDeg[id] === 0);
  const visited = new Set();

  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    fwd[id].forEach(next => {
      layer[next] = Math.max(layer[next], layer[id] + 1);
      if (--inDeg[next] === 0) queue.push(next);
    });
  }

  const maxL   = Math.max(...Object.values(layer), 0);
  const layers = Array.from({ length: maxL + 1 }, () => []);
  ids.forEach(id => layers[layer[id]].push(id));
  return layers;
}

function renderGraph(epics) {
  const svg       = document.getElementById('graph-svg');
  const container = document.getElementById('graph-container');
  const tooltip   = document.getElementById('graph-tooltip');

  if (!epics.length) {
    svg.setAttribute('width', 400); svg.setAttribute('height', 200);
    svg.innerHTML = '<text x="200" y="100" fill="#64748b" text-anchor="middle" font-size="14">No data yet</text>';
    return;
  }

  const nodes = epics.map(e => ({
    id:         e.id,
    label:      e.title,
    status:     e.status,
    deps:       e.dependsOnEpicIds || [],
    storyCount: (e.storyIds || []).length,
  }));

  const layers = topoLayers(nodes);
  const NODE_W = 164, NODE_H = 50, H_GAP = 72, V_GAP = 18, PAD = 40;

  const pos = {};
  layers.forEach((ids, layer) => {
    ids.forEach((id, i) => {
      pos[id] = { x: PAD + layer * (NODE_W + H_GAP), y: PAD + i * (NODE_H + V_GAP) };
    });
  });

  const totalW = PAD * 2 + layers.length * (NODE_W + H_GAP) - H_GAP;
  const maxRows = Math.max(...layers.map(l => l.length), 1);
  const totalH = PAD * 2 + maxRows * (NODE_H + V_GAP) - V_GAP;

  svg.setAttribute('width',  Math.max(totalW, 400));
  svg.setAttribute('height', Math.max(totalH, 200));

  let edges = '', nodesSvg = '';

  nodes.forEach(n => {
    n.deps.forEach(dep => {
      const from = pos[dep], to = pos[n.id];
      if (!from || !to) return;
      const x1 = from.x + NODE_W, y1 = from.y + NODE_H / 2;
      const x2 = to.x,            y2 = to.y   + NODE_H / 2;
      const cx = (x1 + x2) / 2;
      edges += `<path d="M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}"
                  stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>`;
    });
  });

  nodes.forEach(n => {
    const { x, y } = pos[n.id];
    const col   = statusColor(n.status);
    const lbl   = n.label.length > 23 ? n.label.slice(0, 22) + '…' : n.label;
    nodesSvg += `
      <g class="gnode" data-id="${n.id}" data-label="${escHtml(n.label)}"
         data-status="${n.status}" data-sc="${n.storyCount}">
        <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}" rx="6"
              fill="${col}1e" stroke="${col}" stroke-width="1.5"/>
        <text x="${x+10}" y="${y+16}" fill="${col}" font-size="10" font-weight="700"
              font-family="monospace">${n.id}</text>
        <text x="${x+NODE_W/2}" y="${y+33}" fill="#f1f5f9" font-size="11.5"
              text-anchor="middle" font-family="system-ui,sans-serif">${escHtml(lbl)}</text>
      </g>`;
  });

  svg.innerHTML = `
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#475569"/>
      </marker>
    </defs>
    <g>${edges}</g>
    <g>${nodesSvg}</g>`;

  // Tooltip
  svg.querySelectorAll('.gnode').forEach(g => {
    g.style.cursor = 'default';
    g.addEventListener('mouseenter', () => {
      const { label, status, sc } = g.dataset;
      tooltip.innerHTML = `<strong>${escHtml(label)}</strong><br/>${badge(status)}&ensp;${sc} stor${sc!=='1'?'ies':'y'}`;
      tooltip.style.display = 'block';
    });
    g.addEventListener('mousemove', e => {
      const r = container.getBoundingClientRect();
      tooltip.style.left = (e.clientX - r.left + 14) + 'px';
      tooltip.style.top  = (e.clientY - r.top  + 10) + 'px';
    });
    g.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });

  // Pan & zoom
  let scale = 1, tx = 0, ty = 0, drag = false, lx = 0, ly = 0;
  function applyXf() { svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }

  container.addEventListener('wheel', e => {
    e.preventDefault();
    scale = Math.min(Math.max(scale * (e.deltaY > 0 ? 0.9 : 1.1), 0.15), 5);
    applyXf();
  }, { passive: false });

  container.addEventListener('mousedown', e => { drag = true; lx = e.clientX; ly = e.clientY; });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    tx += e.clientX - lx; ty += e.clientY - ly;
    lx = e.clientX; ly = e.clientY;
    applyXf();
  });
  window.addEventListener('mouseup', () => { drag = false; });
}

// ─── Orchestrate ──────────────────────────────────────────────────────────────
async function render() {
  document.getElementById('error-banner').classList.remove('visible');

  const data = await loadTracker();
  if (!data) return;

  const { milestones, epics, stories } = data;

  const done   = stories.filter(s => s.status === 'Done').length;
  const inProg = stories.filter(s => s.status === 'In-Progress').length;
  document.getElementById('proj-subtitle').textContent =
    `${stories.length} stories · ${done} done · ${inProg} in-progress · ${milestones.length} milestones · ${epics.length} epics`;

  renderMilestones(milestones, epics, stories);
  renderEpics(epics, milestones);
  renderStories(stories, epics);
  renderGraph(epics);
}

// ─── Auto-refresh (30 s) ──────────────────────────────────────────────────────
let countdown = 30;
const cdEl = document.getElementById('countdown');
let timer = setInterval(() => {
  cdEl.textContent = --countdown;
  if (countdown <= 0) { countdown = 30; render(); }
}, 1000);

document.getElementById('refresh-btn').addEventListener('click', () => {
  clearInterval(timer);
  countdown = 30; cdEl.textContent = 30;
  timer = setInterval(() => {
    cdEl.textContent = --countdown;
    if (countdown <= 0) { countdown = 30; render(); }
  }, 1000);
  render();
});

render();
</script>
</body>
